<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quién Quiere Ser Millonario · Edición Diamante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #0a0612;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(123, 31, 162, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #0f0c1f 0%, #1a0f2e 50%, #0d0a1a 100%);
            background-attachment: fixed;
        }

        /* Contenedor principal - SIN BACKDROP FILTER para mejor rendimiento */
        .container {
            width: 100%;
            max-width: 1100px;
            background: rgba(12, 8, 24, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 
                0 30px 50px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(210, 180, 140, 0.15),
                0 0 40px rgba(138, 43, 226, 0.2);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f5d76e 0%, #ffb347 30%, #ffeaa7 60%, #ffd700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px #ffb347, 0 0 60px #8a2be2;
            margin-bottom: 8px;
        }

        #subtitle {
            color: #ccd6f6;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* Turno */
        .turn-indicator {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 12px 30px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255,215,0,0.5);
            box-shadow: 0 0 25px rgba(138,43,226,0.3);
            color: #ffd966;
        }

        /* Progreso */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            margin: 20px 0 25px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px #000000, 0 0 10px #8a2be2;
            border: 1px solid #3a2c5a;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f1c40f, #f39c12, #e67e22, #d4af37);
            border-radius: 20px;
            box-shadow: 0 0 15px #ffb347;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* Jugadores */
        .players {
            display: flex;
            justify-content: space-between;
            gap: 25px;
            margin-bottom: 25px;
        }

        .player {
            flex: 1;
            background: linear-gradient(145deg, rgba(30,20,50,0.95), rgba(15,10,30,0.98));
            border-radius: 35px;
            padding: 25px 15px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 15px 25px #000000, 0 4px 0 #2a1a3a;
            transition: all 0.2s ease;
            text-align: center;
        }

        .player.active {
            border: 2px solid #ffd966;
            box-shadow: 0 0 35px #f1c40f, 0 8px 0 #7d6608;
            transform: translateY(-6px);
            background: linear-gradient(145deg, #2a1d45, #1a1030);
        }

        .player.User1.active { border-color: #ff6b6b; box-shadow: 0 0 35px #e74c3c, 0 8px 0 #922b21; }
        .player.User2.active { border-color: #b47aff; box-shadow: 0 0 35px #a855f7, 0 8px 0 #5e3370; }

        .player h2 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 4px 10px black;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .player.User1 h2 { color: #ffffff; text-shadow: 0 0 20px #ff6b6b; }
        .player.User2 h2 { color: #ffffff; text-shadow: 0 0 20px #c084fc; }

        .score {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffeaa7, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .questions-done {
            font-size: 1.1rem;
            color: #b8c7ff;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Comodines */
        .comodines {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .comodin {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            border: 2px solid #ffd966;
            background: radial-gradient(circle at 30% 20%, #2a1f4a, #0f0a1c);
            color: #ffe083;
            font-size: 1.3rem;
            box-shadow: 0 6px 0 #5e3a1c;
            position: relative;
        }

        .comodin.active {
            transform: scale(1.05);
            box-shadow: 0 6px 0 #7d4e1b, 0 0 25px #ffb347;
            border-color: #fbb13c;
        }

        .comodin.used, .comodin.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: 0 3px 0 #3a2510;
            transform: translateY(3px);
        }

        .comodin-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #ffd966;
        }

        /* Temporizador */
        .timer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0 20px;
            gap: 15px;
        }

        .timer {
            font-size: 2.5rem;
            font-weight: 800;
            padding: 12px 30px;
            border-radius: 80px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #e2b93b;
            box-shadow: inset 0 0 15px black, 0 0 25px #e1b12c, 0 6px 0 #7a5c10;
            color: #f6e58d;
            text-shadow: 0 0 15px #ffd700;
            letter-spacing: 5px;
        }

        .timer.warning { color: #ffb347; border-color: #ffb347; }
        .timer.danger { color: #ff6b6b; border-color: #ff6b6b; }

        /* Pregunta */
        .question-container {
            background: rgba(5, 3, 15, 0.7);
            border-radius: 50px;
            padding: 30px 25px;
            border: 1px solid #ffd96655;
            margin: 25px 0;
            box-shadow: inset 0 0 30px #000000, 0 10px 20px #000000;
        }

        .question-number {
            color: #ffd966;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .question {
            font-size: 1.9rem;
            font-weight: 600;
            line-height: 1.5;
            text-shadow: 0 4px 12px black;
            color: #ffffff;
        }

        /* Opciones */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 30px;
        }

        .option {
            background: rgba(20, 15, 40, 0.9);
            padding: 18px 18px 18px 75px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            font-size: 1.3rem;
            position: relative;
            display: flex;
            align-items: center;
            min-height: 85px;
            border: 1.5px solid #5a4a7a;
            box-shadow: 0 8px 0 #0f0b1a;
            color: #ffffff;
            font-weight: 500;
        }

        .option:hover {
            background: #2e2560;
            border-color: #f6c358;
            transform: scale(1.01);
        }

        .option-letter {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 800;
            background: #0e0a1c;
            border: 2px solid #f3c26b;
            color: #ffe69b;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            font-size: 1.8rem;
        }

        .option.correct { background: #1e4d2b; border-color: #2ecc71; }
        .option.incorrect { background: #6b2b2b; border-color: #e74c3c; }

        /* Botones */
        .btn {
            background: linear-gradient(145deg, #f5d76e, #d4a017);
            border: none;
            padding: 16px 40px;
            font-weight: 800;
            letter-spacing: 3px;
            border-radius: 60px;
            box-shadow: 0 12px 0 #8b6914, 0 6px 25px #ffd966;
            color: #0f0b1c;
            font-size: 1.3rem;
            text-transform: uppercase;
            transition: all 0.1s;
            border: 1px solid #fff2b0;
            cursor: pointer;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 8px 0 #8b6914, 0 6px 20px #ffd966; }
        .btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 8px 0 #5a4510; cursor: not-allowed; }

        /* MODAL NOMBRES */
        .name-modal {
            position: fixed;
            inset: 0;
            background: rgba(5, 2, 15, 0.98);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .name-content {
            background: linear-gradient(145deg, #140e28, #0a0618);
            border: 3px solid #ffd966;
            border-radius: 60px;
            padding: 50px 45px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 0 80px #b8860b66, 0 20px 40px #000000;
        }

        .name-content h2 {
            color: #ffd966;
            font-size: 3rem;
            margin-bottom: 35px;
            text-shadow: 0 0 30px #ffb347;
        }

        .name-input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .name-input-group label {
            display: block;
            color: #ffffff;
            font-size: 1.3rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .name-input-group input {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.4rem;
            background: #1e173a;
            border: 2px solid #a48c5b;
            border-radius: 50px;
            color: #ffffff;
            font-weight: 600;
            outline: none;
            box-shadow: inset 0 4px 10px #000000, 0 4px 0 #0d0820;
        }

        .name-input-group input:focus {
            border-color: #ffd966;
            box-shadow: inset 0 4px 10px #000000, 0 0 25px #f1c40f, 0 4px 0 #5a4510;
        }

        .name-error {
            color: #ff6b6b;
            font-size: 1.2rem;
            margin: 20px 0;
            padding: 10px;
            background: #ff000020;
            border-radius: 30px;
            display: none;
        }

        #start-btn {
            width: 100%;
            padding: 22px;
            font-size: 1.6rem;
            margin-top: 20px;
        }

        /* MODAL COMODÍN */
        .comodin-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1130;
            padding: 40px;
            border-radius: 60px;
            border: 2px solid #ffd966;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 70px #b8860b;
        }

        #modal-title {
            color: #ffd966;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        /* Ruleta - CORREGIDA CON TEXTOS VISIBLES */
        .ruleta-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin: 20px 0;
        }

        .ruleta-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
        }

        .ruleta {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from -60deg, #ff6b6b 0 120deg, #48dbfb 120deg 240deg, #9b59b6 240deg 360deg);
            position: relative;
            overflow: hidden;
            transform: rotate(0deg);
            transition: transform 3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 0 5px #2a1f4a, 0 0 35px #ac92ec;
        }

        .ruleta-flecha {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 40px solid #ff4757;
            z-index: 20;
            filter: drop-shadow(0 4px 4px black);
        }

        .ruleta-label {
            position: absolute;
            color: #ffffff;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 2px 2px 6px #000000, 0 0 10px #000000;
            white-space: nowrap;
            z-index: 10;
        }

        .girar-btn {
            background: linear-gradient(145deg, #ff6b6b, #c0392b);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 8px 0 #7a1a1a;
            transition: all 0.1s;
        }

        .girar-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #7a1a1a; }
        .girar-btn:disabled { opacity: 0.6; transform: translateY(4px); box-shadow: 0 4px 0 #7a1a1a; }

        #resultado-llamada-txt {
            color: #ffffff;
            font-size: 1.3rem;
            margin-top: 15px;
            min-height: 40px;
            text-shadow: 0 2px 5px black;
        }

        /* Control música */
        .music-control {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            background: #1f1d36;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd966;
            font-size: 1.8rem;
            border: 2px solid #ffb347;
            box-shadow: 0 0 30px #f39c12;
            cursor: pointer;
            z-index: 99;
        }

        /* Resultado */
        .result {
            text-align: center;
            margin-top: 20px;
            min-height: 50px;
            font-size: 1.5rem;
            color: #ffd966;
        }

        /* Responsive */
        @media (max-width: 750px) {
            .players { flex-direction: column; }
            .options { grid-template-columns: 1fr; }
            .question { font-size: 1.5rem; }
            .header h1 { font-size: 2rem; }
            .name-content { padding: 35px 25px; }
        }
    </style>
</head>
<body>

<!-- MODAL NOMBRES -->
<div class="name-modal" id="name-modal">
    <div class="name-content">
        <h2><i class="fas fa-crown"></i> MILLONARIO</h2>
        <div class="name-input-group">
            <label><i class="fas fa-user"></i> Jugador 1</label>
            <input type="text" id="name1-input" value="Magnate" maxlength="15" placeholder="Nombre">
        </div>
        <div class="name-input-group">
            <label><i class="fas fa-user"></i> Jugador 2</label>
            <input type="text" id="name2-input" value="Genio" maxlength="15" placeholder="Nombre">
        </div>
        <div class="name-error" id="name-error">Ambos nombres son obligatorios</div>
        <button class="btn" id="start-btn">INICIAR JUEGO</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>¿QUIÉN QUIERE SER MILLONARIO?</h1>
        <p id="subtitle">Magnate vs Genio · 15 PREGUNTAS DE ÉLITE</p>
    </div>
    
    <div style="text-align: center;">
        <div class="turn-indicator" id="turn-indicator"><i class="fas fa-crown"></i> Turno de: Magnate</div>
    </div>
    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
    
    <div class="players">
        <div class="player User1 active" id="player1">
            <h2>Magnate</h2>
            <div class="score" id="score1">0</div>
            <div class="questions-done" id="questions1">0/15</div>
            <div class="comodines">
                <div class="comodin fifty active" data-comodin="fifty" data-player="1"><i class="fas fa-balance-scale"></i><span class="comodin-count" id="count-fifty-1">1</span></div>
                <div class="comodin call active" data-comodin="call" data-player="1"><i class="fas fa-phone-alt"></i><span class="comodin-count" id="count-call-1">1</span></div>
                <div class="comodin risk active" data-comodin="risk" data-player="1"><i class="fas fa-dice-d20"></i><span class="comodin-count" id="count-risk-1">1</span></div>
            </div>
        </div>
        <div class="player User2" id="player2">
            <h2>Genio</h2>
            <div class="score" id="score2">0</div>
            <div class="questions-done" id="questions2">0/15</div>
            <div class="comodines">
                <div class="comodin fifty disabled" data-comodin="fifty" data-player="2"><i class="fas fa-balance-scale"></i><span class="comodin-count" id="count-fifty-2">1</span></div>
                <div class="comodin call disabled" data-comodin="call" data-player="2"><i class="fas fa-phone-alt"></i><span class="comodin-count" id="count-call-2">1</span></div>
                <div class="comodin risk disabled" data-comodin="risk" data-player="2"><i class="fas fa-dice-d20"></i><span class="comodin-count" id="count-risk-2">1</span></div>
            </div>
        </div>
    </div>
    
    <div class="timer-container"><i class="fas fa-hourglass-half" style="color:#ffd966; font-size:2rem;"></i><div class="timer" id="timer">30</div></div>
    <div class="question-container">
        <div class="question-number">Pregunta <span id="current-question">1</span>/30</div>
        <div class="question" id="question">Cargando preguntas de alta dificultad...</div>
    </div>
    <div class="options" id="options-container">
        <div class="option" data-option="0"><span class="option-letter">A</span><span class="option-text"></span></div>
        <div class="option" data-option="1"><span class="option-letter">B</span><span class="option-text"></span></div>
        <div class="option" data-option="2"><span class="option-letter">C</span><span class="option-text"></span></div>
        <div class="option" data-option="3"><span class="option-letter">D</span><span class="option-text"></span></div>
    </div>
    
    <div class="controls" style="display: flex; gap: 20px; justify-content: center;">
        <button class="btn" id="next-btn" disabled>Siguiente Pregunta</button>
        <button class="btn" id="restart-btn" style="display: none;">Jugar de Nuevo</button>
    </div>
    <div class="result" id="result"></div>
</div>

<!-- MODAL COMODÍN -->
<div class="comodin-modal" id="comodin-modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <div id="modal-text"></div>
        <button class="btn" id="close-modal" style="margin-top:20px;">Entendido</button>
    </div>
</div>

<!-- CONTROL MÚSICA -->
<div class="music-control" id="music-control"><i class="fas fa-volume-up"></i></div>

<script>
    (function(){
        "use strict";
        
        // Variables globales
        let currentQuestion = 0, score1 = 0, score2 = 0, questionsDone1 = 0, questionsDone2 = 0;
        let isPlayer1Turn = true, questions = [];
        let timerInterval, timeLeft, backgroundMusic, isMusicPlaying = false;
        let player1Name = "Magnate", player2Name = "Genio";
        let comodines1 = { fifty: { cantidad: 1 }, call: { cantidad: 1 }, risk: { cantidad: 1 } };
        let comodines2 = { fifty: { cantidad: 1 }, call: { cantidad: 1 }, risk: { cantidad: 1 } };
        
        // DOM
        const questionEl = document.getElementById('question');
        const currentQSpan = document.getElementById('current-question');
        const score1El = document.getElementById('score1'), score2El = document.getElementById('score2');
        const qDone1El = document.getElementById('questions1'), qDone2El = document.getElementById('questions2');
        const player1Div = document.getElementById('player1'), player2Div = document.getElementById('player2');
        const p1NameEl = document.querySelector('.player.User1 h2'), p2NameEl = document.querySelector('.player.User2 h2');
        const resultEl = document.getElementById('result'), nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn'), optionEls = document.querySelectorAll('.option');
        const turnIndicator = document.getElementById('turn-indicator'), progressBar = document.getElementById('progress-bar');
        const timerEl = document.getElementById('timer'), comodinBtns = document.querySelectorAll('.comodin');
        const modal = document.getElementById('comodin-modal'), modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text'), closeModal = document.getElementById('close-modal');
        const musicCtrl = document.getElementById('music-control'), nameModal = document.getElementById('name-modal');
        const name1Inp = document.getElementById('name1-input'), name2Inp = document.getElementById('name2-input');
        const nameErr = document.getElementById('name-error'), startBtn = document.getElementById('start-btn');
        const subtitle = document.getElementById('subtitle');
        const personas = ["Lea", "Juanes", "Rym"];

        // Preguntas difíciles
        const preguntasUser1 = [
            { question: "¿En qué año se firmó el Tratado de Versalles?", options: ["1918", "1919", "1920", "1921"], correct: 1, time: 45 },
            { question: "¿Quién formuló el principio de incertidumbre?", options: ["Bohr", "Heisenberg", "Schrödinger", "Planck"], correct: 1, time: 45 },
            { question: "¿Metal líquido a temperatura ambiente?", options: ["Galio", "Cesio", "Mercurio", "Bromo"], correct: 2, time: 30 },
            { question: "¿Personaje de 'La metamorfosis'?", options: ["Gregorio Samsa", "Raskolnikov", "Meursault", "Joseph K."], correct: 0, time: 40 },
            { question: "¿Mayor productor de litio?", options: ["Chile", "Argentina", "Australia", "Bolivia"], correct: 2, time: 45 },
            { question: "¿Capital de Burkina Faso?", options: ["Uagadugú", "Bamako", "Yamena", "Niamey"], correct: 0, time: 50 },
            { question: "¿Pintor de 'La noche estrellada'?", options: ["Gauguin", "Van Gogh", "Monet", "Picasso"], correct: 1, time: 35 },
            { question: "¿Autor de 'Crítica de la razón pura'?", options: ["Descartes", "Kant", "Nietzsche", "Locke"], correct: 1, time: 45 },
            { question: "¿Hueso más largo del cuerpo?", options: ["Tibia", "Peroné", "Fémur", "Húmero"], correct: 2, time: 30 },
            { question: "¿Caída del Imperio Romano de Occidente?", options: ["410 d.C.", "476 d.C.", "395 d.C.", "1453 d.C."], correct: 1, time: 50 },
            { question: "¿Teoría de conjuntos?", options: ["Gauss", "Cantor", "Euler", "Riemann"], correct: 1, time: 50 },
            { question: "¿Tumba de Tutankamón?", options: ["Valle de los Reyes", "Giza", "Luxor", "Karnak"], correct: 0, time: 40 },
            { question: "¿Fórmula H2SO4?", options: ["Clorhídrico", "Sulfúrico", "Nítrico", "Acético"], correct: 1, time: 35 },
            { question: "¿La perla de África?", options: ["Uganda", "Kenia", "Tanzania", "Etiopía"], correct: 0, time: 55 },
            { question: "¿Cúpula de San Pedro?", options: ["Brunelleschi", "Miguel Ángel", "Bernini", "Bramante"], correct: 1, time: 50 }
        ];
        const preguntasUser2 = [
            { question: "¿Moneda de Bután?", options: ["Rupia", "Ngultrum", "Taka", "Kyat"], correct: 1, time: 50 },
            { question: "¿Circulación de la sangre?", options: ["Galeno", "Harvey", "Vesalio", "Hipócrates"], correct: 1, time: 45 },
            { question: "¿Capital de Saskatchewan?", options: ["Regina", "Saskatoon", "Winnipeg", "Edmonton"], correct: 0, time: 50 },
            { question: "¿Término 'surrealismo'?", options: ["Breton", "Apollinaire", "Dalí", "Tzara"], correct: 1, time: 50 },
            { question: "¿Constelación Betelgeuse?", options: ["Orión", "Escorpio", "Can Mayor", "Leo"], correct: 0, time: 40 },
            { question: "¿Lago más profundo?", options: ["Superior", "Baikal", "Tanganica", "Caspio"], correct: 1, time: 40 },
            { question: "¿'El clave bien temperado'?", options: ["Mozart", "Beethoven", "Bach", "Vivaldi"], correct: 2, time: 40 },
            { question: "¿Fundación ONU?", options: ["1944", "1945", "1946", "1947"], correct: 1, time: 30 },
            { question: "¿Río más largo de Asia?", options: ["Yangtsé", "Amarillo", "Mekong", "Ganges"], correct: 0, time: 45 },
            { question: "¿Ley de elasticidad?", options: ["Hooke", "Newton", "Young", "Bernoulli"], correct: 0, time: 40 },
            { question: "¿Mar de la Tranquilidad?", options: ["Marte", "Luna", "Titán", "Mercurio"], correct: 1, time: 35 },
            { question: "¿Último faraón?", options: ["Ramsés II", "Cleopatra", "Tutankamón", "Ptolomeo"], correct: 1, time: 40 },
            { question: "¿Más husos horarios?", options: ["Rusia", "EE.UU.", "Francia", "R.Unido"], correct: 2, time: 50 },
            { question: "¿Número atómico 79?", options: ["Plata", "Platino", "Oro", "Mercurio"], correct: 2, time: 30 },
            { question: "¿Primer Secretario ONU?", options: ["Hammarskjöld", "Trygve Lie", "U Thant", "Waldheim"], correct: 1, time: 55 }
        ];
        questions = [...preguntasUser1, ...preguntasUser2];

        // Funciones de UI
        function updateAllUI() {
            p1NameEl.textContent = player1Name; 
            p2NameEl.textContent = player2Name;
            subtitle.textContent = `${player1Name} vs ${player2Name} · 15 PREGUNTAS DE ÉLITE`;
            turnIndicator.innerHTML = `<i class="fas fa-crown"></i> Turno de: ${isPlayer1Turn ? player1Name : player2Name}`;
            score1El.textContent = score1; 
            score2El.textContent = score2;
            qDone1El.textContent = `${questionsDone1}/15`; 
            qDone2El.textContent = `${questionsDone2}/15`;
            progressBar.style.width = `${(currentQuestion/30)*100}%`;
            updateComodinesUI();
        }

        function updateComodinesUI() {
            document.querySelectorAll('.comodin[data-player="1"]').forEach(c => {
                const tipo = c.dataset.comodin;
                const span = document.getElementById(`count-${tipo}-1`);
                const cant = comodines1[tipo].cantidad;
                span.textContent = cant;
                c.classList.toggle('active', cant > 0 && isPlayer1Turn);
                c.classList.toggle('used', cant === 0);
                c.classList.toggle('disabled', !isPlayer1Turn && cant > 0);
            });
            document.querySelectorAll('.comodin[data-player="2"]').forEach(c => {
                const tipo = c.dataset.comodin;
                const span = document.getElementById(`count-${tipo}-2`);
                const cant = comodines2[tipo].cantidad;
                span.textContent = cant;
                c.classList.toggle('active', cant > 0 && !isPlayer1Turn);
                c.classList.toggle('used', cant === 0);
                c.classList.toggle('disabled', isPlayer1Turn && cant > 0);
            });
        }

        function startTimer(sec) {
            clearInterval(timerInterval);
            timeLeft = sec;
            timerEl.textContent = timeLeft;
            timerEl.classList.remove('warning', 'danger');
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                timerEl.classList.toggle('warning', timeLeft <= 15 && timeLeft > 10);
                timerEl.classList.toggle('danger', timeLeft <= 10);
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp();
                }
            }, 1000);
        }

        function timeUp() {
            resultEl.textContent = "⏳ ¡Tiempo agotado!";
            resultEl.style.color = "#e84118";
            optionEls.forEach(o => o.style.pointerEvents = 'none');
            if(isPlayer1Turn) questionsDone1++; else questionsDone2++;
            updateAllUI();
            nextBtn.disabled = false;
        }

        function showQuestion() {
            if(currentQuestion >= 30) { endGame(); return; }
            const q = questions[currentQuestion];
            questionEl.textContent = q.question;
            currentQSpan.textContent = currentQuestion + 1;
            optionEls.forEach((opt, i) => {
                opt.querySelector('.option-text').textContent = q.options[i];
                opt.classList.remove('correct', 'incorrect');
                opt.style.pointerEvents = 'auto';
                opt.style.display = 'flex';
            });
            resultEl.textContent = '';
            resultEl.style.color = '#ffd966';
            nextBtn.disabled = true;
            startTimer(q.time || 40);
        }

        function checkAnswer(sel) {
            clearInterval(timerInterval);
            const correct = questions[currentQuestion].correct;
            optionEls.forEach((opt, idx) => {
                opt.style.pointerEvents = 'none';
                if(idx === correct) opt.classList.add('correct');
                else if(idx === sel) opt.classList.add('incorrect');
            });
            
            if(sel === correct) {
                resultEl.textContent = `✅ ¡Correcto! +1000`;
                resultEl.style.color = "#2ecc71";
                if(isPlayer1Turn) { score1 += 1000; questionsDone1++; }
                else { score2 += 1000; questionsDone2++; }
            } else {
                resultEl.textContent = `❌ Incorrecto. Respuesta: ${questions[currentQuestion].options[correct]}`;
                resultEl.style.color = "#e84118";
                if(isPlayer1Turn) questionsDone1++; else questionsDone2++;
            }
            updateAllUI();
            nextBtn.disabled = false;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.querySelector('.timer-container').style.display = 'none';
            document.querySelector('.question-container').style.display = 'none';
            document.querySelector('.options').style.display = 'none';
            nextBtn.style.display = 'none';
            restartBtn.style.display = 'block';
            
            let winnerMsg;
            if(score1 > score2) winnerMsg = `🏆 ¡${player1Name} es el millonario! 🏆`;
            else if(score2 > score1) winnerMsg = `🏆 ¡${player2Name} es el millonario! 🏆`;
            else winnerMsg = `🤝 ¡Empate entre genios! 🤝`;
            
            resultEl.innerHTML = `<div style="padding:20px;"><h2 style="font-size:2.5rem; color:gold;">Fin del Juego</h2><div style="font-size:2.2rem; margin:20px 0;">${winnerMsg}</div><p style="font-size:1.5rem;">${player1Name}: ${score1} pts<br>${player2Name}: ${score2} pts</p></div>`;
        }

        function initGame() {
            currentQuestion = 0; score1 = 0; score2 = 0; questionsDone1 = 0; questionsDone2 = 0; isPlayer1Turn = true;
            comodines1 = { fifty: { cantidad: 1 }, call: { cantidad: 1 }, risk: { cantidad: 1 } };
            comodines2 = { fifty: { cantidad: 1 }, call: { cantidad: 1 }, risk: { cantidad: 1 } };
            
            document.querySelector('.timer-container').style.display = 'flex';
            document.querySelector('.question-container').style.display = 'block';
            document.querySelector('.options').style.display = 'grid';
            nextBtn.style.display = 'block';
            restartBtn.style.display = 'none';
            
            player1Div.classList.add('active');
            player2Div.classList.remove('active');
            
            updateAllUI();
            showQuestion();
            
            if(!backgroundMusic) {
                backgroundMusic = new Audio('musicamillos');
                backgroundMusic.loop = true;
                backgroundMusic.volume = 0.4;
            }
        }

        // Ruleta corregida con textos visibles
        function useCallFriend() {
            modalTitle.textContent = '📞 Llamar a un amigo';
            modalText.innerHTML = `
                <div class="ruleta-container">
                    <div class="ruleta-wrapper">
                        <div class="ruleta" id="ruleta-modal">
                            <div class="ruleta-label" style="top: 12%; left: 50%; transform: translateX(-50%);">Lea</div>
                            <div class="ruleta-label" style="top: 72%; left: 85%; transform: translate(-50%, -50%);">Juanes</div>
                            <div class="ruleta-label" style="top: 72%; left: 15%; transform: translate(-50%, -50%);">Rym</div>
                        </div>
                        <div class="ruleta-flecha"></div>
                    </div>
                    <button class="girar-btn" id="girar-ruleta-btn">🎲 Girar Ruleta</button>
                    <p id="resultado-llamada-txt"></p>
                </div>
            `;
            modal.style.display = 'flex';
            
            const ruleta = document.getElementById('ruleta-modal');
            const girarBtn = document.getElementById('girar-ruleta-btn');
            const resultado = document.getElementById('resultado-llamada-txt');
            
            girarBtn.addEventListener('click', function girar() {
                const indice = Math.floor(Math.random() * personas.length);
                const grados = 1440 + (indice * 120) + Math.floor(Math.random() * 60);
                ruleta.style.transform = `rotate(${grados}deg)`;
                girarBtn.disabled = true;
                
                setTimeout(() => {
                    resultado.innerHTML = `✨ ${personas[indice]} cree que debes confiar en tu instinto ✨`;
                    if(isPlayer1Turn) comodines1.call.cantidad--;
                    else comodines2.call.cantidad--;
                    updateComodinesUI();
                }, 3100);
            });
        }

        // Event Listeners
        startBtn.addEventListener('click', () => {
            const n1 = name1Inp.value.trim();
            const n2 = name2Inp.value.trim();
            if(!n1 || !n2) {
                nameErr.style.display = 'block';
                return;
            }
            player1Name = n1;
            player2Name = n2;
            nameModal.style.display = 'none';
            initGame();
        });

        optionEls.forEach(opt => {
            opt.addEventListener('click', () => {
                if(nextBtn.disabled) checkAnswer(parseInt(opt.dataset.option));
            });
        });

        nextBtn.addEventListener('click', () => {
            if(currentQuestion >= 29) {
                endGame();
            } else {
                currentQuestion++;
                isPlayer1Turn = !isPlayer1Turn;
                player1Div.classList.toggle('active', isPlayer1Turn);
                player2Div.classList.toggle('active', !isPlayer1Turn);
                updateAllUI();
                showQuestion();
            }
        });

        restartBtn.addEventListener('click', initGame);
        closeModal.addEventListener('click', () => modal.style.display = 'none');

        comodinBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                if(!this.classList.contains('active')) return;
                
                const player = this.dataset.player;
                const tipo = this.dataset.comodin;
                
                if((player === '1' && !isPlayer1Turn) || (player === '2' && isPlayer1Turn)) {
                    alert('¡Solo puedes usar tus comodines en tu turno!');
                    return;
                }
                
                if(tipo === 'fifty') {
                    const correct = questions[currentQuestion].correct;
                    const toHide = [];
                    for(let i = 0; i < 4; i++) {
                        if(i !== correct && toHide.length < 2) toHide.push(i);
                    }
                    optionEls.forEach((opt, i) => {
                        if(toHide.includes(i)) opt.style.display = 'none';
                    });
                    if(isPlayer1Turn) comodines1.fifty.cantidad--;
                    else comodines2.fifty.cantidad--;
                    updateComodinesUI();
                    modal.style.display = 'none';
                } else if(tipo === 'call') {
                    useCallFriend();
                } else if(tipo === 'risk') {
                    timeLeft += 10;
                    timerEl.textContent = timeLeft;
                    if(isPlayer1Turn) comodines1.risk.cantidad--;
                    else comodines2.risk.cantidad--;
                    updateComodinesUI();
                    resultEl.textContent = "⚡ +10 segundos extra ⚡";
                    modal.style.display = 'none';
                }
            });
        });

        musicCtrl.addEventListener('click', () => {
            if(!backgroundMusic) {
                backgroundMusic = new Audio('musicamillos');
                backgroundMusic.loop = true;
                backgroundMusic.volume = 0.4;
            }
            if(isMusicPlaying) {
                backgroundMusic.pause();
                musicCtrl.innerHTML = '<i class="fas fa-volume-mute"></i>';
            } else {
                backgroundMusic.play().catch(e => console.log("Esperando interacción"));
                musicCtrl.innerHTML = '<i class="fas fa-volume-up"></i>';
            }
            isMusicPlaying = !isMusicPlaying;
        });

        // Cerrar modal de nombres con Enter
        [name1Inp, name2Inp].forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') startBtn.click();
            });
        });

        // Inicializar UI
        updateAllUI();
    })();
</script>
</body>
</html>
